services:
  postgres:
    image: postgres:16-alpine
    container_name: challenge-backend-bidcom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-challenge_backend_bidcom}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: challenge-backend-bidcom-redis
    restart: unless-stopped
    ports:
      - '${REDIS_EXTERNAL_PORT:-6379}:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      CACHE_ENABLED: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    ports:
      - '${PORT:-3000}:3000'

volumes:
  postgres_data:
