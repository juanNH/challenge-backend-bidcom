services:
  postgres:
    image: postgres:16-alpine
    container_name: challenge-backend-bidcom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-challenge_backend_bidcom}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - '${PORT:-3000}:3000'

volumes:
  postgres_data:
